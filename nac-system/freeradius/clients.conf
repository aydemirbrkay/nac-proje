# ============================================================
# FreeRADIUS — Client (NAS) Tanımları
# ============================================================
# Bu dosya RADIUS sunucusuna kimlerin istek atabileceğini belirler.
# Her NAS (Network Access Server — switch, AP, VPN gateway vb.)
# burada tanımlı olmalıdır.
#
# "secret" alanı: NAS ile RADIUS arasındaki paylaşımlı anahtar.
# Tüm RADIUS paketleri bu secret ile doğrulanır.
# ============================================================

# ── Localhost — test amaçlı ──
# radtest ve radclient komutları localhost'tan bağlanır
client localhost {
    ipaddr    = 127.0.0.1
    secret    = testing123
    shortname = localhost
}

# ── Docker network'ündeki tüm konteynerler ──
# docker-compose.yml'de tanımlı 172.20.0.0/24 subnet'i
client docker_network {
    ipaddr    = 172.20.0.0/24
    secret    = testing123
    shortname = docker
}
