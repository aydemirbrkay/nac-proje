# ============================================================
# Redis — NAC Sistemi Konfigurasyonu
# ============================================================
# Oturum cache ve rate-limiting icin kullanilir.
# Sifre .env dosyasindan docker-compose ile override edilir.
# ============================================================

# Baglanti
bind 0.0.0.0
port 6379

# Veri kaliciligi (AOF)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Bellek limiti
maxmemory 256mb
maxmemory-policy allkeys-lru

# Loglama
loglevel notice

# Timeout — bos baglantilari kapat (saniye, 0 = devre disi)
timeout 300

# TCP keepalive
tcp-keepalive 60
